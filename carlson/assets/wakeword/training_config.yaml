# Config d'entraînement Butlr pour le wake word "Hey Carlson".
# Référence : https://github.com/dscripka/openWakeWord/blob/main/notebooks/automatic_model_training.ipynb
#
# Ce fichier est lu par carlson/docker/train.py qui le convertit
# au format natif openWakeWord (custom_model.yml) avant l'entraînement.

# Identifiant du modèle — détermine le nom des fichiers .tflite et .onnx produits.
model_name: hey_carlson

# Phrase cible. Doit correspondre exactement à ce que tu diras au micro.
target_phrase: "Hey Carlson"

# Nombre de clips positifs synthétiques à générer (plus = meilleure robustesse).
# ~ 1000 est un bon point de départ pour un premier test (~10 min de génération).
# Monter à 3000-5000 pour un modèle de production.
n_positive_samples: 5000

# Epochs d'entraînement (converti en steps × 100 dans train.py).
# 100 = ~10 000 steps, suffisant pour valider.
n_epochs: 100

# Seuil de détection dans Carlson (configurable via WAKEWORD_THRESHOLD).
# 0.5 = défaut ; monter si trop de faux positifs, baisser si trop de manqués.
detection_threshold: 0.5

# Clips réels enregistrés avec ton micro (optionnel mais fortement recommandé).
# Enregistre avec : python carlson/scripts/record_wakeword.py
# Chemin relatif au volume /data dans Docker (= carlson/assets/wakeword/).
# Laisser vide ("") pour n'utiliser que les samples synthétiques.
custom_positive_clips_dir: "my_recordings"
